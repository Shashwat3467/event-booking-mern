services:
  - type: web
    name: eveenter
    env: node
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: NODE_ENV=production npm run start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
